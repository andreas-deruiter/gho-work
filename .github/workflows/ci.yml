name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx turbo lint

      - name: Format check
        run: npm run format:check

      - name: Type check and build
        run: npx turbo build

      - name: Unit tests
        run: npx vitest run

  build-electron:
    needs: lint-and-test
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Electron app
        run: npm run desktop:build

      - name: E2E smoke test (macOS only)
        if: runner.os == 'macOS'
        run: npx playwright test
